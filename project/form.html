<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product Review Form</title>

  <meta name="description" content="Submit a product review for construction equipment and tools.">
  <meta name="author" content="Abuh Daniel">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Merriweather&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles/form.css">

  <!-- JS -->
  <script src="../scripts/form.js" defer></script>
</head>

<body>

<header>
  <h1>🏗️ Product Review Form</h1>
</header>

<main>

<form method="get" action="review.html">

  <!-- Product -->
  <label for="product">Product Name <span class="required">*</span></label>
  <select id="product" name="product" required>
    <option value="" disabled selected>Select a Product...</option>
  </select>

  <!-- Rating -->
 <fieldset>
  <legend>Overall Rating <span class="required">*</span></legend>

  <input type="radio" id="rating1" name="rating" value="1" required>
  <label for="rating1">☆</label>

  <input type="radio" id="rating2" name="rating" value="2" required>
  <label for="rating2">☆☆</label>

  <input type="radio" id="rating3" name="rating" value="3" required>
  <label for="rating3">☆☆☆</label>

  <input type="radio" id="rating4" name="rating" value="4" required>
  <label for="rating4">☆☆☆☆</label>

  <input type="radio" id="rating5" name="rating" value="5" required>
  <label for="rating5">☆☆☆☆☆</label>

</fieldset>

  <!-- Date -->
  <label for="date">Date of Installation <span class="required">*</span></label>
  <input type="date" id="date" name="date" required>

  <!-- Features -->
  <fieldset>
    <legend>Useful Features</legend>

    <label><input type="checkbox" name="features" value="Durability"> Durability</label>
    <label><input type="checkbox" name="features" value="Efficiency"> Efficiency</label>
    <label><input type="checkbox" name="features" value="Safety"> Safety</label>
    <label><input type="checkbox" name="features" value="Ease of Use"> Ease of Use</label>
  </fieldset>

  <!-- Review -->
  <label for="review">Written Review</label>
  <textarea id="review" name="review" rows="4"></textarea>

  <!-- Name -->
  <label for="username">Your Name</label>
  <input type="text" id="username" name="username" autocomplete="name">

  <!-- Submit -->
  <input type="submit" value="Submit Review">

</form>

</main>

<footer>
  <p>&copy; 2026 BuildRight Construction</p>
</footer>

</body>
</html>
